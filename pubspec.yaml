name: jlpt_voca
description: JLPT 일본어 단어 + 문법 학습 앱
publish_to: "none"

version: 1.2.4+23

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 상태관리
  provider: ^6.1.2

  # 저장
  shared_preferences: ^2.2.3

  # 사운드
  audioplayers: ^6.5.0

  # 광고
  google_mobile_ads: ^5.1.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3

  # 일본어 TTS
  # Android API 21 지원 유지 (4.2.x부터 Android API 24 필요)
  flutter_tts: 3.8.5
  speech_to_text: ^7.4.0
  google_mlkit_digital_ink_recognition: ^0.14.2

  # 날짜/로케일
  intl: ^0.19.0

  # 외부 링크
  url_launcher: ^6.3.0

  # 푸시 알림
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # 홈 화면 위젯
  home_widget: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/sounds/

  fonts:
    - family: Dunggeunmiso
      fonts:
        - asset: assets/fonts/Hakgyoansim_Dunggeunmiso_TTF_R.ttf
        - asset: assets/fonts/Hakgyoansim_Dunggeunmiso_TTF_B.ttf
          weight: 700
